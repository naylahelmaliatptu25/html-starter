<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard Luxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2>Smart Monitoring <span id="statusLog" class="badge bg-danger status-badge">OFF</span></h2>
            <div id="lastSeen">Last seen: --</div>
        </header>

        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Temperature</h6>
                    <h2 id="tempVal" class="text-primary">0°C</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>Humidity</h6>
                    <h2 id="humiVal" class="text-info">0%</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 text-center">
                    <h6>LDR Value</h6>
                    <h2 id="ldrVal" class="text-warning">0</h2>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card p-3"><canvas id="myChart"></canvas></div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Control System</h5>
                    <button onclick="setStatus(true)" class="btn btn-success mb-2 w-100">START</button>
                    <button onclick="setStatus(false)" class="btn btn-danger mb-2 w-100">STOP</button>
                    <input type="number" id="intInput" class="form-control bg-dark text-white mb-2" placeholder="Interval (ms)">
                    <button onclick="setInterval()" class="btn btn-outline-primary w-100">Set Interval</button>
                </div>
            </div>
        </div>
        
        <div class="card p-3 mt-4">
            <h5>Google Sheets History (Live)</h5>
            <iframe src="URL_GOOGLE_SHEET_PUBLISH" style="height: 300px; border:none;"></iframe>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { /* PASTE CONFIG ANDA DI SINI */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Realtime Listener
        db.ref('monitoring').on('value', (snap) => {
            const data = snap.val();
            document.getElementById('tempVal').innerText = data.suhu + "°C";
            document.getElementById('humiVal').innerText = data.kelembapan + "%";
            document.getElementById('ldrVal').innerText = data.cahaya;
            updateChart(data.suhu, data.kelembapan);
        });

        db.ref('settings/logging').on('value', (snap) => {
            const status = snap.val();
            const badge = document.getElementById('statusLog');
            badge.innerText = status ? "ON" : "OFF";
            badge.className = status ? "badge bg-success status-badge" : "badge bg-danger status-badge";
        });

        function setStatus(val) { db.ref('settings').update({logging: val}); }
        function setInterval() { 
            const val = parseInt(document.getElementById('intInput').value);
            db.ref('settings').update({interval: val}); 
        }

        // Chart.js Setup (Sederhana)
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{label: 'Suhu', data: [], borderColor: '#0d6efd'}] }
        });
        function updateChart(s, h) {
            if(chart.data.labels.length > 10) chart.data.labels.shift();
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(s);
            chart.update();
        }
    </script>
</body>
</html>
