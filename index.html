<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart IoT Dashboard - Luxe Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .status-badge { font-size: 0.9rem; padding: 6px 15px; border-radius: 20px; }
        .text-primary { color: #0d6efd !important; }
        .text-info { color: #0dcaf0 !important; }
        .text-warning { color: #ffc107 !important; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0 text-white fw-bold">IoT Dashboard Monitoring</h2>
                <p class="text-muted">Real-time Data from ESP32</p>
            </div>
            <span id="statusLog" class="badge bg-danger status-badge">LOGGING: OFF</span>
        </header>

        <div class="row g-3 mb-4 text-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted small">Temperature</h6>
                    <h1 id="tempVal" class="display-4 fw-bold text-primary">--°C</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted small">Humidity</h6>
                    <h1 id="humiVal" class="display-4 fw-bold text-info">--%</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted small">Light (LDR)</h6>
                    <h1 id="ldrVal" class="display-4 fw-bold text-warning">--</h1>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card p-3 h-100">
                    <h5 class="mb-3">Live Temperature Chart</h5>
                    <canvas id="myChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="mb-4">Remote Control</h5>
                    <div class="d-grid gap-3">
                        <button onclick="setStatus(true)" class="btn btn-success btn-lg fw-bold">START LOGGING</button>
                        <button onclick="setStatus(false)" class="btn btn-danger btn-lg fw-bold">STOP LOGGING</button>
                        <hr class="border-secondary">
                        <label class="small text-muted">Interval Update (ms)</label>
                        <input type="number" id="intInput" class="form-control bg-dark text-white border-secondary" placeholder="Contoh: 5000">
                        <button onclick="changeInterval()" class="btn btn-outline-primary">Update Interval</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // --- KONFIGURASI FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyCINppULfygb28LkPePah3KhAvwGXUTyOk",
            authDomain: "dashboard-iot-a0aa3.firebaseapp.com",
            databaseURL: "https://dashboard-iot-a0aa3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-iot-a0aa3",
            storageBucket: "dashboard-iot-a0aa3.firebasestorage.app",
            messagingSenderId: "934627997292",
            appId: "1:934627997292:web:0f1144dac6b3ab65494a49",
            measurementId: "G-TTH8YLT04P"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Ambil Data Sensor dari Firebase
        db.ref('monitoring').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('tempVal').innerText = data.suhu + "°C";
                document.getElementById('humiVal').innerText = data.kelembapan + "%";
                document.getElementById('ldrVal').innerText = data.cahaya;
                updateChart(data.suhu);
            }
        });

        // 2. Ambil Status Logging
        db.ref('settings/logging').on('value', (snap) => {
            const status = snap.val();
            const badge = document.getElementById('statusLog');
            badge.innerText = status ? "LOGGING: ON" : "LOGGING: OFF";
            badge.className = status ? "badge bg-success status-badge" : "badge bg-danger status-badge";
        });

        // 3. Fungsi Tombol Kontrol
        function setStatus(val) { 
            db.ref('settings').update({logging: val}); 
        }

        function changeInterval() {
            const val = parseInt(document.getElementById('intInput').value);
            if(val >= 1000) {
                db.ref('settings').update({interval: val});
                alert("Interval diperbarui ke " + val + "ms");
            } else {
                alert("Minimal 1000ms!");
            }
        }

        // 4. Konfigurasi Grafik (Chart.js)
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Suhu (°C)',
                    data: [],
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13, 110, 253, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { 
                responsive: true, 
                scales: { 
                    y: { beginAtZero: false }, 
                    x: { display: false } 
                } 
            }
        });

        function updateChart(temp) {
            if(chart.data.labels.length > 10) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(temp);
            chart.update();
        }
    </script>
</body>
</html>
