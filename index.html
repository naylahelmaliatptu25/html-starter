<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Dashboard Luxe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .status-badge { font-size: 0.9rem; padding: 6px 15px; border-radius: 20px; }
        .btn-luxe { border-radius: 10px; transition: 0.3s; font-weight: bold; }
        h1 { font-size: 3rem; }
    </style>
</head>
<body class="p-4">
    <div class="container">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0 text-white">Smart IoT Dashboard</h2>
                <p class="text-muted small">Real-time Monitoring from ESP32</p>
            </div>
            <span id="statusLog" class="badge bg-danger status-badge">LOGGING: OFF</span>
        </header>

        <div class="row text-center">
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted">Temperature</h6>
                    <h1 id="tempVal" class="text-primary">--°C</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted">Humidity</h6>
                    <h1 id="humiVal" class="text-info">--%</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4">
                    <h6 class="text-uppercase text-muted">Light (LDR)</h6>
                    <h1 id="ldrVal" class="text-warning">--</h1>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card p-3 h-100">
                    <h5 class="mb-3">Live Temperature Chart</h5>
                    <canvas id="myChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 h-100">
                    <h5 class="mb-4">System Control</h5>
                    <div class="d-grid gap-3">
                        <button onclick="setStatus(true)" class="btn btn-success btn-lg btn-luxe">START LOGGING</button>
                        <button onclick="setStatus(false)" class="btn btn-danger btn-lg btn-luxe">STOP LOGGING</button>
                        <hr class="border-secondary">
                        <p class="small text-muted mb-1">Set Update Interval (ms)</p>
                        <input type="number" id="intInput" class="form-control bg-dark text-white border-secondary mb-2" placeholder="e.g. 5000">
                        <button onclick="changeInterval()" class="btn btn-outline-primary btn-luxe">Update Interval</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // KONFIGURASI FIREBASE ASLI MILIKMU
        const firebaseConfig = {
            apiKey: "AIzaSyCINppULfygb28LkPePah3KhAvwGXUTyOk",
            authDomain: "dashboard-iot-a0aa3.firebaseapp.com",
            databaseURL: "https://dashboard-iot-a0aa3-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dashboard-iot-a0aa3",
            storageBucket: "dashboard-iot-a0aa3.firebasestorage.app",
            messagingSenderId: "934627997292",
            appId: "1:934627997292:web:0f1144dac6b3ab65494a49",
            measurementId: "G-TTH8YLT04P"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. MENDENGARKAN DATA DARI ESP32 (MONITORING)
        db.ref('monitoring').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('tempVal').innerText = (data.suhu || 0) + "°C";
                document.getElementById('humiVal').innerText = (data.kelembapan || 0) + "%";
                document.getElementById('ldrVal').innerText = data.cahaya || 0;
                updateChart(data.suhu);
            }
        });

        // 2. MENDENGARKAN STATUS LOGGING DARI SETTINGS
        db.ref('settings/logging').on('value', (snap) => {
            const status = snap.val();
            const badge = document.getElementById('statusLog');
            badge.innerText = status ? "LOGGING: ON" : "LOGGING: OFF";
            badge.className = status ? "badge bg-success status-badge" : "badge bg-danger status-badge";
        });

        // 3. FUNGSI TOMBOL
        function setStatus(val) { db.ref('settings').update({logging: val}); }
        function changeInterval() {
            const val = parseInt(document.getElementById('intInput').value);
            if(val >= 1000) {
                db.ref('settings').update({interval: val});
                alert("Interval Updated!");
            } else { alert("Min 1000ms!"); }
        }

        // 4. CHART CONFIG
        const ctx = document.getElementById('myChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Suhu (°C)',
                    data: [],
                    borderColor: '#0d6efd',
                    backgroundColor: 'rgba(13, 110, 253, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, scales: { x: { display: false } } }
        });

        function updateChart(temp) {
            if(chart.data.labels.length > 15) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }
            chart.data.labels.push(new Date().toLocaleTimeString());
            chart.data.datasets[0].data.push(temp);
            chart.update();
        }
    </script>
</body>
</html>
