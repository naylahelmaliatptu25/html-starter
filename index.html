<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART IOT MONITOR - DASHBOARD</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f7f6; color: #333; font-family: 'Segoe UI', sans-serif; }
        .card-custom { background: white; border: none; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .value-text { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .label-title { font-size: 0.8rem; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .chart-container { height: 250px; }
        .btn-control { border-radius: 8px; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-0">Smart IoT Dashboard</h3>
            <span id="log-status" class="badge bg-secondary">LOADING STATUS...</span>
        </div>
        <a href="https://docs.google.com/spreadsheets/d/18Ncn_4Ho95CinQftl4BWFaN63T_XFtRorVF4UGSa8vE/edit?usp=sharing" target="_blank" class="btn btn-outline-success btn-sm">Buka Spreadsheet ↗</a>
    </div>

    <div class="row text-center">
        <div class="col-md-4">
            <div class="card-custom">
                <div class="label-title">Temperature</div>
                <div class="value-text"><span id="temp">0</span>°C</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-custom">
                <div class="label-title">Humidity</div>
                <div class="value-text"><span id="hum">0</span>%</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-custom">
                <div class="label-title">Intensitas Cahaya</div>
                <div class="value-text"><span id="lux">0</span> lx</div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card-custom">
                <h6 class="fw-bold mb-3 border-bottom pb-2">Kontrol Sistem</h6>
                <div class="d-grid gap-2 mb-3">
                    <button class="btn btn-success btn-control" onclick="updateControl('start')">START LOGGING</button>
                    <button class="btn btn-danger btn-control" onclick="updateControl('stop')">STOP LOGGING</button>
                    <button class="btn btn-outline-secondary btn-sm mt-2" onclick="resetLocalLog()">Reset Histori Lokal</button>
                </div>
                <div class="mt-4">
                    <label class="label-title">Set Interval (detik):</label>
                    <div class="input-group">
                        <input type="number" id="inputInterval" class="form-control" placeholder="10">
                        <button class="btn btn-dark" onclick="setIntervalFirebase()">SET</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card-custom">
                <h6 class="fw-bold mb-3">Grafik Suhu & Kelembapan</h6>
                <div class="chart-container"><canvas id="chartTH"></canvas></div>
            </div>
            <div class="card-custom">
                <h6 class="fw-bold mb-3">Grafik Intensitas Cahaya</h6>
                <div class="chart-container"><canvas id="chartLux"></canvas></div>
            </div>
        </div>
    </div>

    <div class="card-custom mt-3">
        <h6 class="fw-bold mb-3">Real-time Local History (Last 15 Data)</h6>
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>WAKTU</th>
                        <th>SUHU (°C)</th>
                        <th>HUM (%)</th>
                        <th>CAHAYA (lx)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE CONFIG MILIKMU
    const firebaseConfig = { databaseURL: "https://dashboard-iot-a0aa3-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. CHART CONFIG
    const chartOptions = { responsive: true, maintainAspectRatio: false };
    
    const ctxTH = document.getElementById('chartTH').getContext('2d');
    const chartTH = new Chart(ctxTH, {
        type: 'line',
        data: { labels: [], datasets: [
            { label: 'Suhu', borderColor: '#e74c3c', data: [], tension: 0.3 },
            { label: 'Hum', borderColor: '#3498db', data: [], tension: 0.3 }
        ]},
        options: chartOptions
    });

    const ctxLux = document.getElementById('chartLux').getContext('2d');
    const chartLux = new Chart(ctxLux, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Cahaya (lx)', borderColor: '#f1c40f', data: [], tension: 0.3, fill: true, backgroundColor: 'rgba(241, 196, 15, 0.1)' }]},
        options: chartOptions
    });

    // 3. LISTEN FIREBASE
    db.ref("monitoring").on("value", (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById("temp").innerText = data.suhu || 0;
            document.getElementById("hum").innerText = data.kelembapan || 0;
            document.getElementById("lux").innerText = data.cahaya || 0;

            const logStatus = document.getElementById("log-status");
            logStatus.innerText = "SISTEM: " + (data.control || "STOP").toUpperCase();
            logStatus.className = data.control === "start" ? "badge bg-success" : "badge bg-danger";

            const timeNow = new Date().toLocaleTimeString();
            updateCharts(timeNow, data.suhu, data.kelembapan, data.cahaya);
            updateTable(timeNow, data.suhu, data.kelembapan, data.cahaya);
        }
    });

    function updateCharts(time, t, h, l) {
        if (chartTH.data.labels.length > 15) {
            chartTH.data.labels.shift(); chartTH.data.datasets[0].data.shift(); chartTH.data.datasets[1].data.shift();
            chartLux.data.labels.shift(); chartLux.data.datasets[0].data.shift();
        }
        chartTH.data.labels.push(time); chartTH.data.datasets[0].data.push(t); chartTH.data.datasets[1].data.push(h);
        chartLux.data.labels.push(time); chartLux.data.datasets[0].data.push(l);
        chartTH.update(); chartLux.update();
    }

    function updateTable(time, t, h, l) {
        const tbody = document.getElementById("tableBody");
        const row = `<tr><td>${time}</td><td>${t}</td><td>${h}</td><td>${l}</td></tr>`;
        tbody.insertAdjacentHTML('afterbegin', row);
        if (tbody.children.length > 15) tbody.removeChild(tbody.lastChild);
    }

    function resetLocalLog() { document.getElementById("tableBody").innerHTML = ""; }
    function updateControl(command) { db.ref("monitoring/control").set(command); }
    function setIntervalFirebase() {
        const val = document.getElementById("inputInterval").value;
        if (val > 0) db.ref("monitoring/interval").set(parseInt(val));
    }
</script>
</body>
</html>
